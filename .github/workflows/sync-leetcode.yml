name: Sync LeetCode Solutions
on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"   # 10:00 AM IST

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch today's LeetCode solution
        shell: bash
        run: |
          RESPONSE=$(curl -s -X POST https://leetcode.com/graphql \
            -H "Content-Type: application/json" \
            -H "Cookie: LEETCODE_SESSION=${{ secrets.LEETCODE_SESSION }}; csrftoken=${{ secrets.LEETCODE_CSRF }}" \
            -d '{"query":"query { activeDailyCodingChallengeQuestion { question { title titleSlug } } }"}')

          echo "Response: $RESPONSE"

          PROBLEM_TITLE=$(echo $RESPONSE | jq -r '.data.activeDailyCodingChallengeQuestion.question.title')
          PROBLEM_SLUG=$(echo $RESPONSE | jq -r '.data.activeDailyCodingChallengeQuestion.question.titleSlug')

          if [ -z "$PROBLEM_TITLE" ] || [ "$PROBLEM_TITLE" = "null" ]; then
            PROBLEM_TITLE="Daily Challenge $(date +'%Y-%m-%d')"
            PROBLEM_SLUG="daily-challenge"
          fi

          echo "problem_title=$PROBLEM_TITLE" >> $GITHUB_ENV
          echo "problem_slug=$PROBLEM_SLUG" >> $GITHUB_ENV

      - name: Fetch submitted solution from LeetCode
        shell: bash
        run: |
          SLUG="${{ env.problem_slug }}"

          # Step 1: Get submission ID first
          SUBMISSION=$(curl -s -X POST https://leetcode.com/graphql \
            -H "Content-Type: application/json" \
            -H "Cookie: LEETCODE_SESSION=${{ secrets.LEETCODE_SESSION }}; csrftoken=${{ secrets.LEETCODE_CSRF }}" \
            -H "x-csrftoken: ${{ secrets.LEETCODE_CSRF }}" \
            -d "{\"query\":\"query { submissionList(offset: 0, limit: 5, questionSlug: \\\"$SLUG\\\") { submissions { id statusDisplay lang } } }\"}")

          echo "Submission List: $SUBMISSION"

          # Get latest accepted submission ID
          SUB_ID=$(echo "$SUBMISSION" | jq -r '[.data.submissionList.submissions[] | select(.statusDisplay=="Accepted")] | first | .id // empty')
          LANG=$(echo "$SUBMISSION" | jq -r '[.data.submissionList.submissions[] | select(.statusDisplay=="Accepted")] | first | .lang // empty')

          if [ -z "$SUB_ID" ] || [ "$SUB_ID" = "null" ]; then
            echo "No accepted submission found — skipping"
            exit 0
          fi

          echo "Found submission ID: $SUB_ID"

          # Step 2: Fetch actual code using submission ID
          DETAIL=$(curl -s -X POST https://leetcode.com/graphql \
            -H "Content-Type: application/json" \
            -H "Cookie: LEETCODE_SESSION=${{ secrets.LEETCODE_SESSION }}; csrftoken=${{ secrets.LEETCODE_CSRF }}" \
            -H "x-csrftoken: ${{ secrets.LEETCODE_CSRF }}" \
            -d "{\"query\":\"query { submissionDetail(id: $SUB_ID) { code } }\"}")

          echo "Detail Response: $DETAIL"

          CODE=$(echo "$DETAIL" | jq -r '.data.submissionDetail.code // empty')

          if [ -z "$CODE" ] || [ "$CODE" = "null" ]; then
            echo "Could not fetch code — skipping"
            exit 0
          fi

          case "$LANG" in
            python3|python) EXT="py" ;;
            java) EXT="java" ;;
            cpp) EXT="cpp" ;;
            c) EXT="c" ;;
            javascript) EXT="js" ;;
            typescript) EXT="ts" ;;
            *) EXT="txt" ;;
          esac

          FOLDER_NAME=$(date +"%B%y")
          TODAY=$(date +"%d-%m-%Y")
          mkdir -p "$FOLDER_NAME"
          echo "$CODE" > "$FOLDER_NAME/${TODAY}.${EXT}"

          echo "folder_name=$FOLDER_NAME" >> $GITHUB_ENV
          echo "today=$TODAY" >> $GITHUB_ENV

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Solved: ${{ env.problem_title }}"
          commit_user_name: "Pavithran26"
          commit_user_email: "pavithran2004cs@gmail.com"
