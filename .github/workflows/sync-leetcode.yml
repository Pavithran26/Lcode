name: Sync LeetCode Solutions

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"   # 4:30 AM UTC = 10:00 AM IST

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch daily challenge problem
        shell: bash
        run: |
          RESPONSE=$(curl -s -X POST https://leetcode.com/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"query { activeDailyCodingChallengeQuestion { question { questionFrontendId title titleSlug } } }"}')

          echo "Response: $RESPONSE"

          PROBLEM_NUMBER=$(echo $RESPONSE | jq -r '.data.activeDailyCodingChallengeQuestion.question.questionFrontendId')
          PROBLEM_TITLE=$(echo $RESPONSE | jq -r '.data.activeDailyCodingChallengeQuestion.question.title')
          PROBLEM_SLUG=$(echo $RESPONSE | jq -r '.data.activeDailyCodingChallengeQuestion.question.titleSlug')

          if [ -z "$PROBLEM_NUMBER" ] || [ "$PROBLEM_NUMBER" = "null" ]; then
            echo "No daily challenge found — exiting"
            exit 1
          fi

          echo "problem_number=$PROBLEM_NUMBER" >> $GITHUB_ENV
          echo "problem_title=$PROBLEM_TITLE" >> $GITHUB_ENV
          echo "problem_slug=$PROBLEM_SLUG" >> $GITHUB_ENV
          
          echo "Found daily challenge: Problem $PROBLEM_NUMBER - $PROBLEM_TITLE"

      - name: Fetch submitted solution from LeetCode
        shell: bash
        run: |
          SLUG="${{ env.problem_slug }}"

          # Get submission list for this problem
          SUBMISSION=$(curl -s -X POST https://leetcode.com/graphql \
            -H "Content-Type: application/json" \
            -H "Cookie: LEETCODE_SESSION=${{ secrets.LEETCODE_SESSION }}; csrftoken=${{ secrets.LEETCODE_CSRF }}" \
            -H "x-csrftoken: ${{ secrets.LEETCODE_CSRF }}" \
            -d "{\"query\":\"query { submissionList(offset: 0, limit: 10, questionSlug: \\\"$SLUG\\\") { submissions { id statusDisplay lang } } }\"}")

          echo "Submission List: $SUBMISSION"

          # Get latest accepted submission ID
          SUB_ID=$(echo "$SUBMISSION" | jq -r '[.data.submissionList.submissions[] | select(.statusDisplay=="Accepted")] | first | .id // empty')
          LANG=$(echo "$SUBMISSION" | jq -r '[.data.submissionList.submissions[] | select(.statusDisplay=="Accepted")] | first | .lang // empty')

          if [ -z "$SUB_ID" ] || [ "$SUB_ID" = "null" ]; then
            echo "No accepted submission found for $SLUG — exiting"
            exit 1
          fi

          echo "Found submission ID: $SUB_ID"
          echo "Language: $LANG"

          # Fetch actual code using submission ID - CORRECTED QUERY
          DETAIL=$(curl -s -X POST https://leetcode.com/graphql \
            -H "Content-Type: application/json" \
            -H "Cookie: LEETCODE_SESSION=${{ secrets.LEETCODE_SESSION }}; csrftoken=${{ secrets.LEETCODE_CSRF }}" \
            -H "x-csrftoken: ${{ secrets.LEETCODE_CSRF }}" \
            -d "{\"query\":\"query { submissionDetails(submissionId: $SUB_ID) { code } }\"}")

          echo "Detail Response: $DETAIL"

          # Check for GraphQL errors
          if echo "$DETAIL" | jq -e '.errors' > /dev/null 2>&1; then
            ERROR_MSG=$(echo "$DETAIL" | jq -r '.errors[0].message')
            echo "GraphQL Error: $ERROR_MSG"
            exit 1
          fi

          # Extract code
          CODE=$(echo "$DETAIL" | jq -r '.data.submissionDetails.code // empty')

          if [ -z "$CODE" ] || [ "$CODE" = "null" ]; then
            echo "Could not fetch code — exiting"
            exit 1
          fi

          # Map language to file extension
          case "$LANG" in
            python3|python) EXT="py" ;;
            java) EXT="java" ;;
            cpp) EXT="cpp" ;;
            c) EXT="c" ;;
            javascript) EXT="js" ;;
            typescript) EXT="ts" ;;
            go) EXT="go" ;;
            rust) EXT="rs" ;;
            ruby) EXT="rb" ;;
            swift) EXT="swift" ;;
            kotlin) EXT="kt" ;;
            php) EXT="php" ;;
            csharp) EXT="cs" ;;
            scala) EXT="scala" ;;
            dart) EXT="dart" ;;
            elixir) EXT="exs" ;;
            *) EXT="txt" ;;
          esac

          # Create all folder if it doesn't exist
          mkdir -p all
          
          PROBLEM_NUMBER="${{ env.problem_number }}"
          FILENAME="${PROBLEM_NUMBER}.${EXT}"
          
          # Check if file already exists
          if [ -f "all/$FILENAME" ]; then
            echo "File all/$FILENAME already exists — creating versioned backup"
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            cp "all/$FILENAME" "all/${PROBLEM_NUMBER}_backup_${TIMESTAMP}.${EXT}"
            echo "Existing file backed up as ${PROBLEM_NUMBER}_backup_${TIMESTAMP}.${EXT}"
          fi
          
          # Save the solution
          printf "%s\n" "$CODE" > "all/$FILENAME"
          
          # Add problem title as comment at the top of file
          case "$EXT" in
            py)
              sed -i "1i# ${{ env.problem_number }}. ${{ env.problem_title }}\n" "all/$FILENAME"
              ;;
            java|cpp|c|js|ts|go|rs|swift|kt|scala|dart)
              sed -i "1i// ${{ env.problem_number }}. ${{ env.problem_title }}\n" "all/$FILENAME"
              ;;
            rb)
              sed -i "1i# ${{ env.problem_number }}. ${{ env.problem_title }}\n" "all/$FILENAME"
              ;;
            php)
              sed -i "1i<?php // ${{ env.problem_number }}. ${{ env.problem_title }}\n" "all/$FILENAME"
              ;;
            cs)
              sed -i "1i// ${{ env.problem_number }}. ${{ env.problem_title }}\n" "all/$FILENAME"
              ;;
            exs)
              sed -i "1i# ${{ env.problem_number }}. ${{ env.problem_title }}\n" "all/$FILENAME"
              ;;
          esac
          
          echo "filename=$FILENAME" >> $GITHUB_ENV
          echo "✅ Solution saved as all/$FILENAME"

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "${{ env.problem_number }}. ${{ env.problem_title }}"
          commit_user_name: "Pavithran26"
          commit_user_email: "pavithran2004cs@gmail.com"
          commit_author: "Pavithran26 <pavithran2004cs@gmail.com>"
          commit_message: "${{ env.problem_number }}. ${{ env.problem_title }}"
